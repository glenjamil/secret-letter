<!DOCTYPE html>
<html>
<head>
<title>For You 💌</title>
<style>
body {
  background: #ffeef2;
  text-align: center;
  font-family: Arial;
  padding-top: 100px;
}
.envelope {
  font-size: 100px;
  cursor: pointer;
}
.letter {
  display: none;
  background: white;
  padding: 20px;
  margin: 20px auto;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<div class="envelope" onclick="openLetter()">💌</div>

<div class="letter" id="letter">
  <h2>Dear You,</h2>
  <p>
    Put your message here.<br><br>
    You make my days brighter.<br><br>
    – From Me ❤️
  </p>
</div>

<script>
function openLetter() {
  document.getElementById("letter").style.display = "block";
}
</script>

</body>
</html>
