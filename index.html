<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Raine 💗</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  overflow-x:hidden;
  background:#ffc0cb;
}

.page{
  display:none;
  min-height:100vh;
  padding-top:80px;
  text-align:center;
  position:relative;
}

.active{ display:block; }

button{
  padding:10px 20px;
  border:none;
  background:#ff69b4;
  color:white;
  border-radius:20px;
  cursor:pointer;
  font-size:15px;
  transition:0.3s;
}
button:hover{ transform:scale(1.1); }

input{
  padding:10px;
  border-radius:20px;
  border:none;
  text-align:center;
}

#page2, #page3{
  background-color:#ffc0cb;
  background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="25" height="25"><text x="0" y="18" font-size="18" fill="rgba(255,105,180,0.25)">♥</text></svg>');
  background-repeat:repeat;
}

/* Envelope */
.envelope{
  font-size:140px;
  cursor:pointer;
  animation:pulse 2s infinite;
}
.big{ font-size:190px; }

@keyframes pulse{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.1); }
  100%{ transform:scale(1); }
}

/* Floating hearts */
.heart{
  position:fixed;
  bottom:-20px;
  animation:rise 8s linear infinite;
  pointer-events:none;
}
@keyframes rise{
  0%{ transform:translateY(0) scale(1); opacity:0.8; }
  100%{ transform:translateY(-110vh) scale(1.3); opacity:0; }
}

/* Layout */
.letter-container{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:25px;
  margin-top:20px;
}

/* Photos */
.photo-column{
  display:flex;
  flex-direction:column;
  gap:20px;
  opacity:0;
  transition:1.2s;
}

.photo-column.show{ opacity:1; }

.photo-column img{
  width:120px;
  border-radius:12px;
  border:6px solid #ff69b4;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-12px); }
  100%{ transform:translateY(0); }
}

/* Note */
.note{
  width:0;
  overflow:hidden;
  background:#fff8b0;
  border:3px solid #e6c200;
  border-radius:15px;
  padding:0;
  transition:all 1.3s ease;
  box-shadow:0 0 30px rgba(255,105,180,0.6);
  background-image:repeating-linear-gradient(
    to bottom,
    #fff8b0 0px,
    #fff8b0 24px,
    #e6c200 25px
  );
  background-size:100% 25px;
  max-width:420px;
  position:relative;
}

.note.open{
  width:420px;
  padding:25px;
}

.note h3{
  margin-top:0;
}

.note p{
  font-size:14px;
  line-height:1.6;
  min-height:200px;
}

/* Sparkles */
.sparkle{
  position:absolute;
  font-size:18px;
  animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{ opacity:0.3; transform:scale(1); }
  to{ opacity:1; transform:scale(1.4); }
}

/* Kiss */
.kiss{
  font-size:45px;
  display:none;
  animation:kissPop 1s ease forwards;
}
@keyframes kissPop{
  0%{ transform:scale(0); }
  70%{ transform:scale(1.3); }
  100%{ transform:scale(1); }
}

/* Mobile */
@media(max-width:800px){
  .letter-container{
    flex-direction:column;
    align-items:center;
  }
  .photo-column{
    flex-direction:row;
  }
  .photo-column img{
    width:85px;
  }
}
</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <div class="envelope">💌</div>
  <h3>For Denise Lorraine</h3>
  <p>Enter our special code</p>
  <input type="password" id="codeBox"><br><br>
  <button onclick="checkCode()">Continue</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  <h2>Our Memories 💕</h2>
  <p>I kept these moments safe in my heart.</p>
  <div class="envelope big" onclick="openEnvelope()">💌</div>
  <p>Click to read my letter 💗</p>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
  <div class="letter-container">

    <!-- LEFT 1,2,4 -->
    <div class="photo-column" id="leftPhotos">
      <img src="photo1.jpg">
      <img src="photo2.jpg">
      <img src="photo4.jpg">
    </div>

    <div class="note" id="note">
      <div class="sparkle" style="top:10px;left:10px;">✨</div>
      <div class="sparkle" style="bottom:10px;right:10px;">✨</div>

      <h3>Dear Raine,</h3>
      <p id="typedText"></p>

      <button onclick="showKiss()">Sign 💗</button>
      <div class="kiss" id="kiss">💋</div>
    </div>

    <!-- RIGHT 3,5,6 -->
    <div class="photo-column" id="rightPhotos">
      <img src="photo3.jpg">
      <img src="photo5.jpg">
      <img src="photo6.jpg">
    </div>

  </div>
</div>

<script>
const message = `Happiest Birthday my love 💗

Every photo here reminds me how lucky I am to have you.
Even when we’re apart, my heart still feels your warmth.
You are my comfort, my favorite memory, and my future.

Stay kind, stay beautiful, and keep chasing your dreams.
I will always be right here loving you.

– Nagmamahal Glenn ❤️`;

let i = 0;

function typeWriter(){
  if(i < message.length){
    document.getElementById("typedText").innerHTML += 
      message.charAt(i) === "\n" ? "<br>" : message.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

function checkCode(){
  if(document.getElementById("codeBox").value==="0520"){
    document.getElementById("page1").classList.remove("active");
    document.getElementById("page2").classList.add("active");
  }else{
    document.getElementById("error").innerText="Wrong code 💔";
  }
}

function openEnvelope(){
  document.getElementById("page2").classList.remove("active");
  document.getElementById("page3").classList.add("active");

  setTimeout(()=>{
    document.getElementById("note").classList.add("open");
  },500);

  setTimeout(()=>{
    document.getElementById("leftPhotos").classList.add("show");
    document.getElementById("rightPhotos").classList.add("show");
  },1200);

  setTimeout(()=>{
    typeWriter();
  },1400);
}

function showKiss(){
  document.getElementById("kiss").style.display="block";
}

/* Floating hearts */
setInterval(()=>{
  if(document.getElementById("page2").classList.contains("active") ||
     document.getElementById("page3").classList.contains("active")){
    const hearts=["💗","💖","💕","💘"];
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(18+Math.random()*25)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),8000);
  }
},700);
</script>

</body>
</html>
